<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caça-Níqueis do Prazer ❤️</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ffe3e3 0%, #fbc2eb 100%);
            min-height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }

        h1 {
            color: #d63031;
            text-align: center;
            margin-bottom: 5px;
            font-size: 26px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        p {
            color: #4a4a4a;
            text-align: center;
            margin-bottom: 20px;
            font-size: 16px;
        }

        /* Tela de Início Obrigatória */
        #tela-inicial {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #ffe3e3 0%, #fbc2eb 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .btn-principal {
            background-color: #d63031;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(214, 48, 49, 0.4);
            transition: transform 0.2s, background-color 0.2s;
        }

        .btn-principal:hover {
            transform: scale(1.05);
            background-color: #b32424;
        }

        .btn-reset {
            margin-top: 25px;
            background-color: transparent;
            color: #d63031;
            border: 2px solid #d63031;
            padding: 10px 25px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-reset:hover {
            background-color: #d63031;
            color: white;
        }

        #conteudo-jogo {
            display: none; 
            width: 100%;
            max-width: 450px;
            flex-direction: column;
            align-items: center;
        }

        /* Estrutura do Caça-Níqueis */
        .maquina-container {
            background: #fff;
            border: 4px solid #d63031;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
            width: 100%;
            box-sizing: border-box;
            display: flex;
            justify-content: space-between;
            gap: 10px;
            overflow: hidden;
            position: relative;
        }

        /* Linha guia central (mira) */
        .maquina-container::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 100%;
            height: 2px;
            background: rgba(214, 48, 49, 0.3);
            z-index: 5;
            pointer-events: none;
        }

        .roleta {
            flex: 1;
            height: 120px;
            background: #f8f9fa;
            border: 2px solid #ff7675;
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }

        .roleta-janela {
            position: absolute;
            width: 100%;
            top: 0;
            transition: transform 2s cubic-bezier(0.1, 0.8, 0.1, 1);
            display: flex;
            flex-direction: column;
        }

        .item {
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-weight: bold;
            font-size: 14px;
            color: #2d3436;
            padding: 5px;
            box-sizing: border-box;
            border-bottom: 1px solid #ffe3e3;
        }

        /* Box de resultado final destacado */
        #resultado-texto {
            margin-top: 20px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 15px;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            color: #d63031;
            min-height: 54px;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            box-sizing: border-box;
            border: 1px dashed #d63031;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        #resultado-texto.show {
            opacity: 1;
        }
    </style>
</head>
<body>

    <!-- Áudios com preload configurado -->
    <audio id="musica-fundo" loop preload="auto" src="JeTAime.mp3"></audio>
    <!-- Usando um som de clique/roletar padrão -->
    <audio id="som-clique" preload="auto" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-84.wav"></audio>

    <div id="tela-inicial">
        <h1 style="margin-bottom: 25px;">Prontos para jogar? ❤️</h1>
        <button class="btn-principal" onclick="iniciarJogo()">Começar</button>
    </div>

    <div id="conteudo-jogo">
        <h1>Caça-Níqueis do Prazer ❤️</h1>
        <p>Gire as roletas para montar o desafio aleatório da vez!</p>
        
        <div class="maquina-container">
            <div class="roleta"><div class="roleta-janela" id="roleta1"></div></div>
            <div class="roleta"><div class="roleta-janela" id="roleta2"></div></div>
            <div class="roleta"><div class="roleta-janela" id="roleta3"></div></div>
        </div>

        <div id="resultado-texto"></div>

        <button class="btn-principal" id="btn-girar" onclick="girarRoletas()" style="margin-top: 25px; font-size: 18px;">Girar Roleta! 🎰</button>
    </div>

    <script>
        // Configuração das 3 colunas independentes
        const opcoesColuna1 = ["Beijar 💋", "Lamber 👅", "Chupar 🥵", "Massagear 💆‍♂️", "Morder de leve 🦷", "Soprar 💨"];
        const opcoesColuna2 = ["o pescoço", "a nuca", "a barriga", "as coxas", "as orelhas", "os mamilos"];
        const opcoesColuna3 = ["com olhos vendados 🙈", "usando o óleo de massagem ✨", "bem devagar... ⏳", "com gelo na boca 🧊", "com muita pegada! 🔥", "enquanto sussurra safadezas 💬"];

        const r1 = document.getElementById('roleta1');
        const r2 = document.getElementById('roleta2');
        const r3 = document.getElementById('roleta3');
        const resultadoTexto = document.getElementById('resultado-texto');
        const btnGirar = document.getElementById('btn-girar');

        const musicaFundo = document.getElementById('musica-fundo');
        const somClique = document.getElementById('som-clique');

        musicaFundo.volume = 0.3; 
        somClique.volume = 0.7;   

        // Altura fixa de cada item definida no CSS (120px)
        const itemHeight = 120;

        function iniciarJogo() {
            document.getElementById('tela-inicial').style.display = 'none';
            document.getElementById('conteudo-jogo').style.display = 'flex';
            
            tocarMusica();
            inicializarRoletas();
        }

        function tocarMusica() {
            musicaFundo.play().catch(() => {
                document.addEventListener('click', function triggerAudio() {
                    musicaFundo.play();
                    document.removeEventListener('click', triggerAudio);
                }, { once: true });
            });
        }

        // Preenche visualmente as roletas multiplicando os itens para dar efeito de giro infinito
        function inicializarRoletas() {
            montarColuna(r1, opcoesColuna1);
            montarColuna(r2, opcoesColuna2);
            montarColuna(r3, opcoesColuna3);
        }

        function montarColuna(elementoHtml, listaItens) {
            elementoHtml.innerHTML = '';
            // Repete a lista 5 vezes para criar o efeito visual de rolagem longa
            const listaExpandida = [...listaItens, ...listaItens, ...listaItens, ...listaItens, ...listaItens];
            listaExpandida.forEach(texto => {
                const item = document.createElement('div');
                item.classList.add('item');
                item.innerText = texto;
                elementoHtml.appendChild(item);
            });
        }

        function girarRoletas() {
            // Desativa o botão temporariamente durante o giro
            btnGirar.disabled = true;
            resultadoTexto.classList.remove('show');

            // Toca som de clique/giro
            somClique.currentTime = 0;
            somClique.play().catch(e => {});

            // Sorteia o index final para cada coluna (Garante que pare entre as 2 ultimas repetições para o efeito de rolagem)
            const idx1 = Math.floor(Math.random() * opcoesColuna1.length) + (opcoesColuna1.length * 3);
            const idx2 = Math.floor(Math.random() * opcoesColuna2.length) + (opcoesColuna2.length * 3);
            const idx3 = Math.floor(Math.random() * opcoesColuna3.length) + (opcoesColuna3.length * 3);

            // Aplica a transição CSS simulando o movimento da máquina caça-níqueis
            r1.style.transform = `translateY(-${idx1 * itemHeight}px)`;
            r2.style.transform = `translateY(-${idx2 * itemHeight}px)`;
            r3.style.transform = `translateY(-${idx3 * itemHeight}px)`;

            // Aguarda o fim da transição do CSS (2 segundos) para exibir o resultado por extenso
            setTimeout(() => {
                const acao = opcoesColuna1[idx1 % opcoesColuna1.length];
                const local = opcoesColuna2[idx2 % opcoesColuna2.length];
                const detalhe = opcoesColuna3[idx3 % opcoesColuna3.length];

                resultadoTexto.innerHTML = `🔥 Desafio: ${acao} ${local} ${detalhe}!`;
                resultadoTexto.classList.add('show');
                
                // Reativa o botão
                btnGirar.disabled = false;
            }, 2000);
        }
    </script>
</body>
</html>
