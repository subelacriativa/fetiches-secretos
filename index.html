<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nosso Jogo do Amor ❤️</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ffe3e3 0%, #fbc2eb 100%);
            min-height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }

        h1 {
            color: #d63031;
            text-align: center;
            margin-bottom: 5px;
            font-size: 26px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        p {
            color: #4a4a4a;
            text-align: center;
            margin-bottom: 20px;
            font-size: 16px;
        }

        /* Tela de Início Obrigatória */
        #tela-inicial {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #ffe3e3 0%, #fbc2eb 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .btn-principal {
            background-color: #d63031;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(214, 48, 49, 0.4);
            transition: transform 0.2s, background-color 0.2s;
        }

        .btn-principal:hover {
            transform: scale(1.05);
            background-color: #b32424;
        }

        .btn-reset {
            margin-top: 25px;
            background-color: transparent;
            color: #d63031;
            border: 2px solid #d63031;
            padding: 10px 25px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-reset:hover {
            background-color: #d63031;
            color: white;
        }

        #conteudo-jogo {
            display: none; 
            width: 100%;
            max-width: 400px;
            flex-direction: column;
            align-items: center;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            width: 100%;
        }

        /* Estrutura 3D da Carta */
        .card {
            height: 140px;
            perspective: 1000px;
            cursor: pointer;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.5s ease;
            transform-style: preserve-3d;
            box-shadow: 0 4px 10px rgba(0,0,0,0.12);
            border-radius: 12px;
        }

        .card.flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            padding: 12px;
            box-sizing: border-box;
        }

        .card-front {
            background: linear-gradient(135deg, #ff7675 0%, #d63031 100%);
            color: white;
            font-size: 42px;
            font-weight: bold;
            border: 3px solid #fff;
        }

        .card-back {
            background-color: white;
            color: #2d3436;
            transform: rotateY(180deg);
            font-size: 14px;
            font-weight: 600;
            border: 3px solid #ff7675;
            line-height: 1.4;
            overflow: hidden;
        }
    </style>
</head>
<body>

    <!-- Áudios com preload configurado -->
    <audio id="musica-fundo" loop preload="auto" src="JeTAime.mp3"></audio>
    <audio id="som-clique" preload="auto" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-84.wav"></audio>

    <div id="tela-inicial">
        <h1 style="margin-bottom: 25px;">Prontos para jogar? ❤️</h1>
        <button class="btn-principal" onclick="iniciarJogo()">Começar</button>
    </div>

    <div id="conteudo-jogo">
        <h1>Nosso Jogo do Amor ❤️</h1>
        <p>Escolha uma carta por vez e cumpra o desafio...</p>
        <div class="grid-container" id="grid"></div>
        <button class="btn-reset" onclick="reiniciarJogo()">Embaralhar Novamente 🔄</button>
    </div>

    <script>
        const listaDesafios = [
            "Tire uma peça de roupa 🔞",
            "Me faça uma massagem de 3 minutos 💆‍♂️",
            "Dê um beijo de cinema de 30 segundos 💋",
            "Posição: Do jeitinho que você mais gosta 🔥",
            "Tome um gole da sua bebida 🥂",
            "Fique sem falar por 1 minuto enquanto ganha carinho 🤫",
            "Posição: De conchinha (mas com segundas intenções) 😉",
            "Sussurre um desejo secreto no meu ouvido 💬"
        ];

        const grid = document.getElementById('grid');
        const musicaFundo = document.getElementById('musica-fundo');
        const somClique = document.getElementById('som-clique');

        musicaFundo.volume = 0.3; 
        somClique.volume = 0.7;   

        function iniciarJogo() {
            document.getElementById('tela-inicial').style.display = 'none';
            document.getElementById('conteudo-jogo').style.display = 'flex';
            
            // Força o desbloqueio do contexto de áudio exigido por navegadores mobile
            tocarMusica();
            gerarTabuleiro();
        }

        function tocarMusica() {
            musicaFundo.play().catch(() => {
                // Fallback para iOS/Safari: tenta tocar no primeiro toque na tela caso falhe no botão
                document.addEventListener('click', function triggerAudio() {
                    musicaFundo.play();
                    document.removeEventListener('click', triggerAudio);
                }, { once: true });
            });
        }

        function gerarTabuleiro() {
            grid.innerHTML = ''; // Limpa o tabuleiro anterior
            
            // Clona e embaralha a lista original de forma segura
            const desafiosEmbaralhados = [...listaDesafios].sort(() => Math.random() - 0.5);

            desafiosEmbaralhados.forEach((desafio) => {
                const card = document.createElement('div');
                card.classList.add('card');
                
                card.innerHTML = `
                    <div class="card-inner">
                        <div class="card-front">❤️</div>
                        <div class="card-back">${desafio}</div>
                    </div>
                `;

                card.addEventListener('click', function() {
                    // Toca o efeito sonoro cortando reproduções anteriores (evita atrasos)
                    somClique.currentTime = 0;
                    somClique.play().catch(e => console.log("Áudio pendente de interação"));
                    
                    this.classList.toggle('flipped');
                });

                grid.appendChild(card);
            });
        }

        function reiniciarJogo() {
            // Toca o som ao resetar
            somClique.currentTime = 0;
            somClique.play().catch(e => {});
            
            // Fecha todas as cartas com uma animação rápida antes de reembaralhar
            const cartas = document.querySelectorAll('.card');
            cartas.forEach(c => c.classList.remove('flipped'));
            
            // Aguarda a animação de fechamento acabar para gerar o novo tabuleiro
            setTimeout(gerarTabuleiro, 400);
        }
    </script>
</body>
</html>
