<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Match dos Fetiches Secretos 🌶️</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #2c001e 0%, #000000 100%);
            color: #fff;
            min-height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .card-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 2px solid #ff4757;
            border-radius: 20px;
            padding: 30px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(255, 71, 87, 0.2);
            box-sizing: border-box;
        }

        h1 {
            color: #ff4757;
            font-size: 24px;
            margin-top: 0;
            text-shadow: 0 0 10px rgba(255, 71, 87, 0.5);
        }

        p {
            color: #ccc;
            font-size: 15px;
            line-height: 1.5;
        }

        .btn {
            background: #ff4757;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            box-shadow: 0 4px 15px rgba(255, 71, 87, 0.4);
            width: 100%;
            margin-top: 15px;
        }

        .btn:hover {
            transform: scale(1.03);
            background: #ff2e44;
        }

        /* Estilo Tinder de Votação */
        .fetiche-card {
            background: #222;
            border-radius: 15px;
            padding: 40px 20px;
            margin: 25px 0;
            min-height: 120px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 1px solid #333;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.6);
        }

        .fetiche-emoji {
            font-size: 45px;
            margin-bottom: 15px;
        }

        .fetiche-texto {
            font-size: 18px;
            font-weight: bold;
            color: #fff;
        }

        .botoes-tinder {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 20px;
        }

        .btn-tinder {
            flex: 1;
            border: none;
            padding: 15px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .btn-tinder:active {
            transform: scale(0.95);
        }

        .btn-passo {
            background-color: #2f3542;
            color: #ced6e0;
        }

        .btn-quero {
            background-color: #2ed573;
            color: white;
            box-shadow: 0 4px 15px rgba(46, 213, 115, 0.4);
        }

        /* Lista de Matches Finais */
        .match-item {
            background: rgba(46, 213, 115, 0.15);
            border: 1px solid #2ed573;
            padding: 12px;
            border-radius: 10px;
            margin: 10px 0;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: bold;
        }

        .no-match {
            background: rgba(255, 71, 87, 0.1);
            border: 1px dashed #ff4757;
            padding: 20px;
            border-radius: 10px;
            color: #ffa5a5;
        }

        .progresso {
            font-size: 12px;
            color: #ff4757;
            font-weight: bold;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="card-container" id="jogo-container">
        <!-- O conteúdo será gerado dinamicamente pelo JavaScript -->
    </div>

    <script>
        // Lista de fantasias e fetiches prontos (você pode alterar/adicionar quantos quiser)
        const listaFetiches = [
            { emoji: "🙈", texto: "Usar uma venda nos olhos" },
            { emoji: "🧊", texto: "Brincar com gelo ou texturas quentes" },
            { emoji: "🚗", texto: "Fazer em um lugar público/ousado" },
            { emoji: "⛓️", texto: "Ser amarrado(a) ou prender as mãos" },
            { emoji: "🎭", texto: "Realizar uma fantasia de Roleplay (personagens)" },
            { emoji: "📸", texto: "Tirar fotos ou gravar um vídeo íntimo (e apagar depois)" },
            { emoji: "🍫", texto: "Usar caldas quentes, chantilly ou morangos no corpo" },
            { emoji: "🤫", texto: "Fazer uma rapidinha em um lugar proibido" },
            { emoji: "👙", texto: "Escolher a lingerie/roupa do outro para a noite" },
            { emoji: "💆‍♂️", texto: "Uma sessão longa de massagem erótica sem pressa" }
        ];

        let jogadorAtual = 1;
        let indexAtual = 0;
        
        // Armazenará as respostas: true para Quero, false para Passo
        let respostasJogador1 = [];
        let respostasJogador2 = [];

        const container = document.getElementById('jogo-container');

        // Tela 1: Boas-vindas / Instruções do Jogador 1
        function telaInicial() {
            container.innerHTML = `
                <h1>Match dos Fetiches Secretos 🌶️</h1>
                <p>Descubram novos desejos juntos sem medo ou julgamentos. O sistema só revelará as fantasias se <strong>AMBOS</strong> disserem SIM!</p>
                <hr style="border: 0; border-top: 1px solid #444; margin: 20px 0;">
                <p><strong>Passo 1:</strong> Entregue o celular para o <strong>Jogador 1</strong>.</p>
                <button class="btn" onclick="iniciarVotacao()">Sou o Jogador 1 ➔</button>
            `;
        }

        // Inicia o loop de perguntas para o jogador da vez
        function iniciarVotacao() {
            indexAtual = 0;
            mostrarCard();
        }

        // Exibe o fetiche atual estilo Tinder
        function mostrarCard() {
            const fetiche = listaFetiches[indexAtual];
            container.innerHTML = `
                <div class="progresso">JOGADOR ${jogadorAtual} • ${indexAtual + 1}/${listaFetiches.length}</div>
                <div class="fetiche-card">
                    <div class="fetiche-emoji">${fetiche.emoji}</div>
                    <div class="fetiche-texto">${fetiche.texto}</div>
                </div>
                <div class="botoes-tinder">
                    <button class="btn-tinder btn-passo" onclick="votar(false)">Passo 🥱</button>
                    <button class="btn-tinder btn-quero" onclick="votar(true)">Quero muito 🥵</button>
                </div>
            `;
        }

        // Registra o voto e passa para o próximo card
        function votar(quero) {
            if (jogadorAtual === 1) {
                respostasJogador1.push(quero);
            } else {
                respostasJogador2.push(quero);
            }

            indexAtual++;

            if (indexAtual < listaFetiches.length) {
                mostrarCard();
            } else {
                finalizarTurno();
            }
        }

        // Gerencia a transição de turnos ou calcula o final
        function finalizarTurno() {
            if (jogadorAtual === 1) {
                jogadorAtual = 2;
                container.innerHTML = `
                    <h1>Turno do Jogador 1 Concluído! ✔️</h1>
                    <p>Suas respostas foram salvas em segredo absoluto.</p>
                    <hr style="border: 0; border-top: 1px solid #444; margin: 20px 0;">
                    <p>Agora, <strong>passe o celular</strong> para o <strong>Jogador 2</strong> fazer as escolhas dele(a).</p>
                    <button class="btn" onclick="iniciarVotacao()">Sou o Jogador 2 ➔</button>
                `;
            } else {
                calcularMatches();
            }
        }

        // Compara os arrays e mostra o veredito final
        function calcularMatches() {
            let matches = [];

            for (let i = 0; i < listaFetiches.length; i++) {
                if (respostasJogador1[i] === true && respostasJogador2[i] === true) {
                    matches.push(listaFetiches[i]);
                }
            }

            let htmlResultado = `<h1>🔥 Seus Matches Secretos 🔥</h1>`;
            
            if (matches.length > 0) {
                htmlResultado += `<p>Vocês deram match nestas fantasias! Significa que ambos querem testar. Aproveitem o momento:</p>`;
                matches.forEach(m => {
                    htmlResultado += `
                        <div class="match-item">
                            <span>${m.emoji}</span>
                            <span>${m.texto}</span>
                        </div>
                    `;
                });
            } else {
                htmlResultado += `
                    <div class="no-match">
                        <p>💥 Ih, nenhum match exato dessa vez!</p>
                        <p style="font-size: 13px; color: #ccc;">Não se preocupem, isso significa que seus desejos secretos estão guardados. Que tal jogar de novo e tentar ser mais ousado(a)?</p>
                    </div>
                `;
            }

            htmlResultado += `<button class="btn" onclick="reiniciarJogo()" style="background:#222; border:1px solid #ff4757; margin-top:25px;">Jogar Novamente 🔄</button>`;
            container.innerHTML = htmlResultado;
        }

        function reiniciarJogo() {
            jogadorAtual = 1;
            respostasJogador1 = [];
            respostasJogador2 = [];
            telaInicial();
        }

        // Inicializa o jogo na tela certa
        telaInicial();
    </script>
</body>
</html>
